<!-- Replace PORTAL_ID / FORM_ID / LEAD_TYPE before deploying -->
<script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
<script>
  (function () {
    var LEAD_TYPE = 'warbot_access';
    var SOURCE_CAMPAIGN = new URLSearchParams(window.location.search).get('utm_campaign') || '';

    function setHidden(formElement, name, value) {
      var field = formElement.querySelector('input[name="' + name + '"]');
      if (field) {
        field.value = value;
      }
    }

    hbspt.forms.create({
      region: 'na1',
      portalId: 'PORTAL_ID',
      formId: 'FORM_ID',
      target: '#warbot-form-root',
      onFormReady: function (formElement) {
        setHidden(formElement, 'website_domain', 'warbot.cloud');
        setHidden(formElement, 'lead_source', 'form');
        setHidden(formElement, 'lead_type', LEAD_TYPE);
        setHidden(formElement, 'source_campaign', SOURCE_CAMPAIGN);
      }
    });
  })();
</script>
<div id="warbot-form-root"></div>
